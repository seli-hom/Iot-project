<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Sensor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sensor-card { transition: all 0.3s ease; }
        .motion-active { background-color: #ffcccc; border-color: #ff0000; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4 text-center">Environment Monitor</h1>
    
    <div class="row g-4">
        <div class="col-md-4">
            <div id="pir-card" class="card h-100 shadow-sm sensor-card">
                <div class="card-body text-center">
                    <h5 class="card-title text-muted">Motion (PIR)</h5>
                    <h2 id="pir-value" class="display-6">Initializing...</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title text-muted">Temperature & Humidity</h5>
                    <h2 id="temp-value" class="display-6">--°C</h2>
                    <p id="hum-value" class="text-primary fw-bold">--% Humidity</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title text-muted">Light Sensitivity (PS)</h5>
                    <h2 id="ps-value" class="display-6">--</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function updateDashboard() {
        try {
            const response = await fetch('/api/data');
            const data = await response.json();

            // Update PIR and change card color if motion is detected
            const pirElem = document.getElementById('pir-value');
            const pirCard = document.getElementById('pir-card');
            if (data.PIR === 1) {
                pirElem.innerText = "MOTION DETECTED";
                pirCard.classList.add('motion-active');
            } else {
                pirElem.innerText = "No Motion";
                pirCard.classList.remove('motion-active');
            }

            // Update HT (Humidity/Temperature)
            document.getElementById('temp-value').innerText = `${data.HT.temp}°C`;
            document.getElementById('hum-value').innerText = `${data.HT.hum}% Humidity`;

            // Update PS (Light Sensitivity)
            document.getElementById('ps-value').innerText = data.PS;

        } catch (error) {
            console.error('Error fetching sensor data:', error);
        }
    }

    // Refresh every 2 seconds
    setInterval(updateDashboard, 2000);
    updateDashboard(); // Initial call
</script>

</body>
</html>
