{% extends "base.html" %} {% block content %}

{% include "adminSidebar.html" with context %}
<div class="container d-flex flex-column align-items-center p-4">
  <div
    class="card shadow-sm mb-4 rounded"
    style="min-width: 450px; max-width: 600px; width: 100%"
  >
    <div class="card-body p-4">
      <h3 class="card-title text-center mb-4">Update Existing Product</h3>

      {% if message %}
      <div class="alert {{ 'alert-success' if success else 'alert-danger' }}">
        {{ message }}
      </div>
      {% endif %}

        <form action="{{ url_for('store.productUpdateAction', product_id=product.product_id) }}" method="POST">
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input
              type="text"
              class="form-control rounded"
              name="product_name"
              value="{{ product.product_name }}"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Price</label>
            <input
              type="number"
              step="0.01" 
              class="form-control rounded"
              value="{{ product.product_price }}"
              name="product_price"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Barcode</label>
            <input
              type="text"
              id="barcode_input"
              class="form-control rounded"
              value="{{ product.barcode_num }}"
              name="product_barcode"
              placeholder="Scan the product barcode"
              required
            />
          </div>
          <div class="col-md-6">
            <label class="form-label">Category</label>
            <select name="product_category" class="form-control" required>
                <option value="" disabled>-- Select Category --</option>
                {% for cat in categories %}
                    <option value="{{ cat['category_id'] }}" 
                        {% if cat['category_id']|int == product['category_id']|int %} selected {% endif %}>
                        {{ cat['category_type'] }}
                    </option>
                {% endfor %}
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Company</label>
            <input
              type="text"
              class="form-control rounded"
              value="{{ product.product_company }}"
              name="product_company"
              required
            />
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea
              class="form-control rounded"
              name="product_description"
              required
            >{{ product.product_description }}</textarea>
          </div>

          <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary w-100 rounded">
              Submit
            </button>
          </div>
        </div>
      </form>

      <div class="text-center mt-2">
        <a href="{{ url_for('store.productList') }}">View Existing Products</a>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('barcode_input').addEventListener('keydown', function(e) {
    // If the key pressed is 'Enter' (which scanners send)
    if (e.key === 'Enter') {
      e.preventDefault(); // Stop the form from submitting
      console.log("Scanner Enter blocked. Form did not submit.");
    }
  });
</script>

{% endblock %}
