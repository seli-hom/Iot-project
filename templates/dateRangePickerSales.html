<script
  type="text/javascript"
  src="https://cdn.jsdelivr.net/jquery/latest/jquery.min.js"
></script>
<script
  type="text/javascript"
  src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"
></script>
<script
  type="text/javascript"
  src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"
></script>
<link
  rel="stylesheet"
  type="text/css"
  href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css"
/>

<div class="col-md-4 mb-4">
  <input class="form-control" type="text" name="daterange" />
</div>
<script>
  $(function () {
    $('input[name="daterange"]').daterangepicker(
      {
        opens: "left",
      },
      function (start, end, label) {
        createCanvasDate(start.format("YYYY-MM-DD"), end.format("YYYY-MM-DD"));
      },
    );
  });

  async function createCanvasDate(start, end) {
    console.log(start);
    data = await fetch(
      `http://127.0.0.1:5000/admin-dashboard/reports/sales/fetch?start=${start}&end=${end}`,
    ).then((response) => {
      return response.json();
    });
    let names = [];
    let sold = [];

    for (let index = 0; index < data.length; index++) {
      names.push(data[index]["product_name"]);
      sold.push(data[index]["quantity_sold"]);
    }
    console.log(sold);

    myChart.data.datasets[0].data = sold;
    myChart.data.label = names;
    myChart.update();
    console.log(myChart.data.datasets[0].data);
    let TableBody = document.getElementById("tableBody");
    TableBody.innerHTML = `
        `;
    let html = ``;
    let overall = 0;
    for (let index = 0; index < data.length; index++) {
      html += `<tr>

              <td>${data[index]["product_name"] ?? "0"}</td>
            <td>${data[index]["quantity_sold"] ?? 0}</td>
            <td>${data[index]["total"] ?? 0} $</td>
            `;
      overall += data[index]["total"] ?? 0;
      html += `</tr>`;
    }

    html += `</tr>`;
    TableBody.innerHTML = html;

    let summaryBody = document.getElementById("summaryTableBody");
    summaryBody.innerHTML = ``;
    if (typeof data[0] != "undefined") {
      html = ` <tr>
                <td>Most Sold: ${data[data.length - 1]["product_name"] ?? "None"}</td>
              </tr>
              <tr>
                <td>Least Sold: ${data[0]["product_name"]}</td>
              </tr>
              <tr>
                <td>Total Sales: ${overall} $</td>
              </tr>
          `;
    } else {
      html = ` <tr>
                <td>Most Sold: N/A</td>
              </tr>
              <tr>
                <td>Least Sold: N/A </td>
              </tr>
              <tr>
                <td>Total Sales:  0$</td>
              </tr>
          `;
    }
    summaryBody.innerHTML = html;
  }
  createCanvas();
</script>
