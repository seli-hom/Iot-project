<!DOCTYPE html>
<html>
<head>
    <title>Smart Store Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/master/gauge.min.js"></script>
    <style>
        body { background: #f4f7f6; padding: 20px; }
        .card { border-radius: 15px; border: none; margin-bottom: 20px; }
        .gauge-container { display: flex; justify-content: center; padding: 10px; }
        .spinning { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } } /* rotates the svg */
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Fridge Temperature Monitoring</h2>
    <div id="notif-log" class="mt-3 p-2 bg-light border rounded" style="max-height: 150px; overflow-y: auto;">
    </div>
    <div class="row">
        <div class="col-lg-6 mb-4">
            <div class="card shadow p-4">
                <h4 class="text-center mb-2">Refrigerator 1</h4>
                <center>
                    <div class="gauge-box">
                        <canvas id="temp1" data-type="radial-gauge" data-width="180" data-height="180" data-units="°C" data-title="Temp" data-min-value="0" data-max-value="50"></canvas>
                        <canvas id="hum1" data-type="radial-gauge" data-width="180" data-height="180" data-units="%" data-title="Humidity" data-min-value="0" data-max-value="100"></canvas>
                    </div>
                </center>
            </div>
        </div>

        <div class="col-lg-6 mb-4">
            <div class="card shadow p-4">
                <h4 class="text-center mb-2">Refrigerator 2</h4>
                <center>
                    <div class="gauge-box">
                        <canvas id="temp2" data-type="radial-gauge" data-width="180" data-height="180" data-units="°C" data-title="Temp" data-min-value="0" data-max-value="50"></canvas>
                        <canvas id="hum2" data-type="radial-gauge" data-width="180" data-height="180" data-units="%" data-title="Humidity" data-min-value="0" data-max-value="100"></canvas>
                    </div>
                </center>
            </div>
        </div>
    </div>

    <div class="card shadow-sm p-4">
        <div class="d-flex align-items-center justify-content-between">
            <div>
                <svg id="fanIcon" width="50" height="50" viewBox="0 0 1024 1024" fill="#0d6efd">
                    <path d="M793.6 552.448c16.896 4.608 30.208 9.216 40.96 14.848V558.08c0-121.856-68.608-227.84-169.984-281.088-0.512 11.776-3.072 26.112-7.68 42.496 80.384 47.104 134.656 133.632 136.704 232.96zM517.12 558.08m-87.04 0a87.04 87.04 0 1 0 174.08 0 87.04 87.04 0 1 0-174.08 0Z"></path>
                    <path d="M761.344 856.064c-26.112 0-52.224-6.656-76.288-20.48-39.424-22.528-96.768-94.208-171.008-213.504-74.24 118.784-131.584 190.976-171.008 213.504-73.216 42.496-167.424 16.896-209.92-56.32-20.48-35.328-26.112-76.8-15.36-116.736 10.752-39.424 35.84-72.704 71.68-93.184 38.4-22.016 125.44-35.84 259.072-40.96h9.728l-4.608-9.728C390.144 399.36 357.888 315.904 357.888 271.36c0-84.48 69.12-153.6 153.6-153.6s153.6 69.12 153.6 153.6c0 44.032-31.744 126.976-94.72 245.76l-5.12 11.264 13.824 0.512c133.632 5.12 221.184 18.944 259.072 40.96 73.216 42.496 98.816 136.704 56.32 209.92-28.16 49.152-79.872 76.288-133.12 76.288z"></path>
                </svg>
                <b class="ms-2">Fan</b>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="fanToggle" style="transform: scale(1.5);">
            </div>
        </div>
    </div>

</div>

<div style="display:none;">
    <span id="raw-t1"></span><span id="raw-h1"></span>
    <span id="raw-t2"></span><span id="raw-h2"></span>
</div>

<script>
    function refresh() {
            fetch('/api/temp-data')
                .then(res => res.json())
                .then(data => {
                    // 1. Update Gauges using the Gauge API (Makes needles move)
                    if (document.gauges && document.gauges.length > 0) {
                        document.gauges.forEach(function(gauge) {
                            // Check which canvas this gauge is attached to
                            const id = gauge.options.renderTo; 
                            
                            if (id === 'temp1') gauge.value = data.frig1.temp;
                            if (id === 'hum1')  gauge.value = data.frig1.hum;
                            if (id === 'temp2') gauge.value = data.frig2.temp;
                            if (id === 'hum2')  gauge.value = data.frig2.hum;
                        });
                    }

                    // 2. Update Raw Text (Optional, for debugging)
                    const updateText = (id, val) => {
                        const el = document.getElementById(id);
                        if (el) el.innerText = val;
                    };
                    updateText('raw-t1', data.frig1.temp);
                    updateText('raw-h1', data.frig1.hum);
                    updateText('raw-t2', data.frig2.temp);
                    updateText('raw-h2', data.frig2.hum);

                    // 3. Update Fan UI
                    const icon = document.getElementById('fanIcon');
                    const toggle = document.getElementById('fanToggle');
                    if (data.fan_on) {
                        icon.classList.add('spinning');
                        toggle.checked = true;
                    } else {
                        icon.classList.remove('spinning');
                        toggle.checked = false;
                    }

                    // 4. Notifications
                    if (data.last_alert) {
                        const log = document.getElementById('notif-log');
                        if (log && !log.innerHTML.includes(data.last_alert)) {
                            const time = new Date().toLocaleTimeString();
                            log.innerHTML = `<div class="p-1 border-bottom small">[${time}] ${data.last_alert}</div>` + log.innerHTML;
                        }
                    }
                })
                .catch(err => console.error("Refresh Error:", err));
        }

        // Fan Toggle Control
        document.getElementById('fanToggle').onchange = function() {
            const state = this.checked ? 'on' : 'off';
            fetch('/api/fan/' + state)
                .then(res => res.json())
                .then(response => {
                    console.log("Fan command sent:", state);
                })
                .catch(err => console.error("Toggle Error:", err));
        };

        // Run once on load, then every 2 seconds
        refresh(); 
        setInterval(refresh, 2000);
</script>
</body>
</html>
