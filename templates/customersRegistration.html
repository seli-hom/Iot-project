{% extends "base.html" %}
{% block content %}

<div class="container d-flex flex-column align-items-center py-5">
  <div class="card shadow-sm mb-4 rounded" style="min-width: 450px; max-width: 600px; width: 100%;">
    <div class="card-body p-4">

      <h3 class="card-title text-center mb-4">Register a new Customer Today!</h3>

      {% if message %}
        <div class="alert {{ 'alert-success' if success else 'alert-danger' }}">
          {{ message }}
        </div>
      {% endif %}

      <form method="POST" action="" class="mb-3" id="registrationForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control rounded" name="user_fname" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control rounded" name="user_lname" required>
          </div>

          <div class="col-12">
            <label class="form-label">Email</label>
            <input type="email" class="form-control rounded" name="user_email" required>
          </div>

          <div class="col-12">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control rounded" name="user_phone" required>
          </div>

          <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" class="form-control rounded" name="user_address" required>
          </div>

          <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary w-100 rounded" id="submitBtn">Submit</button>
          </div>

        </div>
      </form>

      <div id="notifications" class="mt-3"></div>

      <div class="text-center mt-2">
        <a href="{{ url_for('store.customersList') }}">View Existing Customers</a>
      </div>

    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {
    const submitBtn = document.getElementById("submitBtn");
    if (submitBtn) {
        submitBtn.addEventListener("click", (e) => {
            console.log("Submit clicked!");
        });
    }

    const notificationsEl = document.getElementById("notifications");
    if (notificationsEl) {
        notificationsEl.innerHTML = "Loading notifications...";
        setTimeout(() => {
            notificationsEl.innerHTML = "<div class='alert alert-info'>No new notifications</div>";
        }, 500);
    }
});
</script>
{% endblock %}
