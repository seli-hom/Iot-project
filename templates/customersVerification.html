{% extends "base.html" %} {% block content %}

<div class="container d-flex flex-column align-items-center py-5">
  <div class="card shadow-sm mb-4 rounded" style="min-width: 450px; max-width: 600px; width: 100%;">
    <div class="card-body p-4">

      <h3 class="card-title text-center mb-4">Set Up Your Account Password</h3>

      {% if message %}
        <div class="alert {{ 'alert-success' if success else 'alert-danger' }}">
          {{ message }}
        </div>
      {% endif %}

      <form method="POST" class="mb-3">
        <div class="row g-3">
          
          <div class="col-12">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control rounded" name="password" required>
          </div>

          <div class="col-12">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control rounded" name="confirm_password" required>
          </div>

          <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary w-100 rounded">Set Password</button>
          </div>

        </div>
      </form>

      <div class="text-center mt-2">
        <a href="{{ url_for('store.storeIndex') }}">Back to Home</a>
      </div>

    </div>
  </div>
</div>

{% endblock %}
