{%  extends "base.html" %}


{% block content %}
<div class="container my-4">
    <h2 class="mb-4">Products List </h2>

        <!-- SIDEBAR -->
        {% include "adminSidebar.html" with context %}


    {% if order|length == 0 %}
        <div class="alert alert-warning">No products found yet.</div>
    {% else %}
        <div class="card shadow-sm">
            <div class="card-body p-3">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>0rder</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for element in order %}
                        <tr>
                            <td>{{element }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <a href="{{ url_for('store.customerOrders') }}" class="btn btn-primary">Go Back</a>
            </div>
        </div>
    {% endif %}

</div>
{% endblock %}
