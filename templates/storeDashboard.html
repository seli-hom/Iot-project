<!-- Highlight Sync & ScrollSpy -->
<script>
const sidebarLinks = document.querySelectorAll('#navbar-example3 .nav-link');
const cards = document.querySelectorAll('.dashboard-card');

const linkToCardMap = {};
sidebarLinks.forEach(link => {
    const targetId = link.getAttribute('href').substring(1);
    const card = document.getElementById(targetId);
    if(card) linkToCardMap[targetId] = card;
});

// Sidebar click → highlight card
sidebarLinks.forEach(link => {
    link.addEventListener('click', () => {
        cards.forEach(c => c.classList.remove('active'));
        sidebarLinks.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const targetId = link.getAttribute('href').substring(1);
        if(linkToCardMap[targetId]) linkToCardMap[targetId].classList.add('active');
    });
});

// Card interaction → highlight sidebar
cards.forEach(card => {
    const inputs = card.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            cards.forEach(c => c.classList.remove('active'));
            sidebarLinks.forEach(l => l.classList.remove('active'));
            card.classList.add('active');
            const link = document.querySelector(`#navbar-example3 a[href="#${card.id}"]`);
            if(link) link.classList.add('active');
        });
    });
    const checkbox = card.querySelector('input[type="checkbox"]');
    if(checkbox) {
        checkbox.addEventListener('change', () => {
            cards.forEach(c => c.classList.remove('active'));
            sidebarLinks.forEach(l => l.classList.remove('active'));
            card.classList.add('active');
            const link = document.querySelector(`#navbar-example3 a[href="#${card.id}"]`);
            if(link) link.classList.add('active');
        });
    }
});
</script>
