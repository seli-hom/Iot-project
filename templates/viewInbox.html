{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">
        📬 Store Inbox
    </h3>

    {% if emails %}

    <div class="list-group">

        {% for email in emails %}
        <div 
            class="list-group-item shadow-sm mb-3 rounded"
            id="email-{{ email.subject | replace(' ','-') }}"
        >

            <h5>{{ email.subject }}</h5>

            <small class="text-muted">
                From: {{ email.from }}
            </small>

            <br>

            <small class="text-muted">
                {{ email.date }}
            </small>

            <hr>

            <p class="mb-0">
                {{ email.body }}
            </p>

        </div>
        {% endfor %}

    </div>

    {% else %}

    <div class="alert alert-info">
        No emails found in the store inbox.
    </div>

    {% endif %}

</div>

{% endblock %}
