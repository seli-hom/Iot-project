{% extends "base.html" %}
{% block content %}

<div class="container py-5">
  <h3 class="mb-4 text-center">Store Inbox</h3>

  {% if emails %}
    <div class="list-group">
      {% for email in emails %}
        <div class="list-group-item shadow-sm mb-3 rounded">
          <h5 class="mb-1">{{ email.subject }}</h5>
          <small class="text-muted">From: {{ email.from }}</small>
          <p class="mt-2">{{ email.body }}</p>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="alert alert-info text-center">
      No emails found in the store inbox.
    </div>
  {% endif %}
</div>

{% endblock %}
