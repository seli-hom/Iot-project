<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/00-Global-Styles.css') }}">
    <title>IoT Store</title>
  </head>
  <body>
    <!-- Navbar: -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('store.storeIndex') }}">
          <b>IoT Project - Smart Store</b>
        </a>

        <div class="ms-auto text-white d-flex align-items-center">
          <span class="me-2">Welcome Anon</span>
          <div class="dropdown">
            <button class="btn btn-primary dropdown-toggle"
                    type="button"
                    id="loginDropdown"
                    data-bs-toggle="dropdown"
                    data-bs-auto-close="outside"
                    aria-expanded="false">
              Please login
            </button>
            <div class="dropdown-menu dropdown-menu-end p-4 shadow"
                aria-labelledby="loginDropdown"
                style="min-width: 320px;">
              <form method="POST" action="{{ url_for('store.customersRegistration') }}">
                <div class="mb-3">
                  <label class="form-label">Email address</label>
                  <input type="email"
                        name="email"
                        class="form-control"
                        placeholder="email@example.com"
                        required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password"
                        name="password"
                        class="form-control"
                        placeholder="Password"
                        required>
                </div>
                <div class="form-check mb-3">
                  <input type="checkbox"
                        name="remember"
                        class="form-check-input"
                        id="rememberCheck">
                  <label class="form-check-label" for="rememberCheck">
                    Remember me
                  </label>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Sign in
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content: -->
    <div class="container mt-4">{% block content %}{% endblock %}</div>
   
    <!-- Footer: -->
    <footer class="bg-primary text-white py-4 mt-auto">
      <div class="container d-flex justify-content-between align-items-center">
          <span>&copy; {{ current_year }} IoT Project</span>
          <div>
              <a href="{{ url_for('store.storeIndex') }}" class="text-white me-3 text-decoration-none">Home</a>
              <a href="{{ url_for('store.customersRegistration') }}" class="text-white text-decoration-none">Register</a>
          </div>
      </div>
    </footer>
    <!-- Import Javascript scripts here: -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
