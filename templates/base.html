<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/00-Global-Styles.css') }}">
    <title>IoT Store</title>
  </head>
  <body>
    <main>
      <!-- Navbar: -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
          <a class="navbar-brand" href="{{ url_for('store.storeIndex') }}">
            <b>IoT Project - Smart Store</b>
          </a>

          <div class="ms-auto text-white d-flex align-items-center">
            {% if session.get('user_first_name') %}
              <!-- logged-in view -->
              <span class="me-2">Welcome {{ session.get('user_first_name') }}</span>
              <form method="GET" action="{{ url_for('store.logout') }}">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
              </form>
            {% else %}
              <!-- logged-out view -->
              <span class="me-2">Welcome Anon</span>
              <div class="dropdown">
                <button class="btn btn-primary dropdown-toggle"
                        type="button"
                        id="loginDropdown"
                        data-bs-toggle="dropdown"
                        data-bs-auto-close="outside"
                        aria-expanded="false">
                  Please login
                </button>
                <div class="dropdown-menu dropdown-menu-end p-4 shadow"
                    aria-labelledby="loginDropdown"
                    style="min-width: 320px;">
                  <!-- login form -->
                  <form method="POST" action="{{ url_for('store.login') }}">
                    <div class="mb-3">
                      <label class="form-label">Email address</label>
                      <input type="email"
                            name="email"
                            class="form-control"
                            placeholder="email@example.com"
                            required>
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Password</label>
                      <input type="password"
                            name="password"
                            class="form-control"
                            placeholder="Password"
                            required>
                    </div>
                    <div class="form-check mb-3">
                      <input type="checkbox"
                            name="remember"
                            class="form-check-input"
                            id="rememberCheck">
                      <label class="form-check-label" for="rememberCheck">
                        Remember me
                      </label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                      Sign in
                    </button>
                  </form>
                </div>
              </div>
            {% endif %}
          </div>
        </div>
      </nav>

      <!-- Main Content: -->
      <div class="container mt-4">{% block content %}{% endblock %}</div>
    
      <!-- Footer: -->
      <footer class="bg-primary text-white py-4 mt-auto">
        <div class="container d-flex justify-content-between align-items-center">
            <span>&copy; {{ current_year }} IoT Project</span>
            <div>
                <a href="{{ url_for('store.storeIndex') }}" class="text-white me-3 text-decoration-none">Home</a>
                <a href="{{ url_for('store.customersRegistration') }}" class="text-white text-decoration-none">Register</a>
                <a href="{{ url_for('store.storeDashboard') }}" class="text-white text-decoration-none">Dashboard</a>
                <a href="{{ url_for('store.viewInbox') }}" class="text-white text-decoration-none">Inbox</a>
            </div>
        </div>
      </footer>
    </main>
    <!-- Import Javascript scripts here: -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Project Scripts: -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

 <script>
function drawOverlayGauge(canvasId, minGood, maxGood, maxValue) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    if (canvas.chart) {
        canvas.chart.destroy();
    }

    const badBefore = minGood;
    const good = maxGood - minGood;
    const badAfter = maxValue - maxGood;

    const chart = new Chart(canvas, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [badBefore, good, badAfter],
                backgroundColor: [
                    '#ffe66d90',
                    '#73a56b90',
                    '#ff6b6b90'
                ],
                borderWidth: 0
            }]
        },
        options: {
            rotation: -90,
            circumference: 180,
            cutout: '83%',
            plugins: { legend: { display: false }, tooltip: { enabled: false } }
        }
    });

    canvas.chart = chart;
}

function createNeedleGauge(canvasId, value, min, max, units, ticks) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    new RadialGauge({
        renderTo: canvasId,
        width: 200,
        height: 200,
        minValue: min,
        maxValue: max,
        value: value,
        units: units,
        majorTicks: ticks,
        minorTicks: 1,
        strokeTicks: true,
        highlights: [],
        colorPlate: "#EEE",
        borders: false,
        needleType: "line",
        needleWidth: 3,
        needleCircleSize: 12,
        needleCircleOuter: true,
        animationDuration: 600
    }).draw();
}

const fanIcon = document.getElementById("fanIcon");
const fanToggle = document.getElementById("fanToggle");

function updateFanVisual(isOn) {
    if (isOn) {
        fanIcon.classList.remove('fan-off');
        fanIcon.classList.add('fan-on');
    } else {
        fanIcon.classList.remove('fan-on');
        fanIcon.classList.add('fan-off');
    }
}

fanToggle.addEventListener('change', () => {
    const isOn = fanToggle.checked;
    updateFanVisual(isOn);

    fetch('/fan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state: isOn })
    })
    .then(res => res.json())
    .then(data => console.log('Fan toggled:', data))
    .catch(err => console.error(err));
});

updateFanVisual(fanToggle.checked);
document.addEventListener("DOMContentLoaded", function() {
    const placeholderFridges = [
        { temp: 4, tempMax: 10, tempMin: 0, humidity: 65, humMax: 100, humMin: 0, fan: true },
        { temp: 6, tempMax: 10, tempMin: 0, humidity: 55, humMax: 100, humMin: 0, fan: false }
    ];

    placeholderFridges.forEach((fridge, index) => {
        const idx = index + 1;

        const tempMinEl = document.getElementById(`tempMin${idx}`);
        const tempMaxEl = document.getElementById(`tempMax${idx}`);
        const humMinEl = document.getElementById(`humMin${idx}`);
        const humMaxEl = document.getElementById(`humMax${idx}`);

        if (!tempMinEl || !tempMaxEl || !humMinEl || !humMaxEl) return;

        const tempMin = parseFloat(tempMinEl.value);
        const tempMax = parseFloat(tempMaxEl.value);
        const humMin = parseFloat(humMinEl.value);
        const humMax = parseFloat(humMaxEl.value);

        drawOverlayGauge(`tempGaugeBg${idx}`, tempMin, tempMax, fridge.tempMax);
        drawOverlayGauge(`humidityGaugeBg${idx}`, humMin, humMax, fridge.humMax);

        createNeedleGauge(
            `tempGaugeNeedle${idx}`,
            fridge.temp,
            fridge.tempMin,
            fridge.tempMax,
            "°C",
            ["0","2","4","6","8","10"]
        );

        createNeedleGauge(
            `humidityGaugeNeedle${idx}`,
            fridge.humidity,
            fridge.humMin,
            fridge.humMax,
            "%",
            ["0","20","40","60","80","100"]
        );
    });

    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('change', () => {
            placeholderFridges.forEach((fridge, index) => {
                const idx = index + 1;

                const tempMinEl = document.getElementById(`tempMin${idx}`);
                const tempMaxEl = document.getElementById(`tempMax${idx}`);
                const humMinEl = document.getElementById(`humMin${idx}`);
                const humMaxEl = document.getElementById(`humMax${idx}`);

                if (!tempMinEl || !tempMaxEl || !humMinEl || !humMaxEl) return;

                const tempMin = parseFloat(tempMinEl.value);
                const tempMax = parseFloat(tempMaxEl.value);
                const humMin = parseFloat(humMinEl.value);
                const humMax = parseFloat(humMaxEl.value);

                drawOverlayGauge(`tempGaugeBg${idx}`, tempMin, tempMax, fridge.tempMax);
                drawOverlayGauge(`humidityGaugeBg${idx}`, humMin, humMax, fridge.humMax);
            });
        });
    });
});
</script>

<script>
function sendThresholdUpdate(fridgeId) {
    const tempMin = document.getElementById(`tempMin${fridgeId}`)?.value;
    const tempMax = document.getElementById(`tempMax${fridgeId}`)?.value;
    const humMin = document.getElementById(`humMin${fridgeId}`)?.value;
    const humMax = document.getElementById(`humMax${fridgeId}`)?.value;

    fetch('/threshold/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            fridge: fridgeId,
            tempMin,
            tempMax,
            humMin,
            humMax
        })
    });
}

document.addEventListener("DOMContentLoaded", () => {
    ['1','2'].forEach(id => {
        ['tempMin','tempMax','humMin','humMax'].forEach(prefix => {
            const el = document.getElementById(`${prefix}${id}`);
            if (el) {
                el.addEventListener('change', () => {
                    sendThresholdUpdate(id);
                });
            }
        });
    });
});
</script>

<script>
async function loadNotifications() {
    try {
        const res = await fetch('/api/notifications');
        if (!res.ok) throw new Error("Failed to fetch notifications");

        const notifications = await res.json();
        const container = document.getElementById('notifications-container');
        container.innerHTML = '';

        if (!notifications || notifications.length === 0) {
            container.innerHTML = '<div class="text-muted">No notifications</div>';
            return;
        }

        notifications.forEach(notif => {
            const div = document.createElement('div');
            div.className = 'border-bottom pb-2 mb-2';

            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <b>${notif.title}</b> - <small class="text-muted">${notif.created_at}</small>
                    </div>
                    <button class="btn btn-sm btn-link p-0" style="font-size:0.85em;">Show more</button>
                </div>
                <div class="notif-summary mt-1">${notif.summary}</div>
                <div class="notif-extended mt-1 text-muted" style="display:none; font-size:0.85em;">
                    ${notif.extended}
                </div>
            `;

            const toggleBtn = div.querySelector('button');
            const extendedDiv = div.querySelector('.notif-extended');

            toggleBtn.addEventListener('click', () => {
                if (extendedDiv.style.display === 'none') {
                    extendedDiv.style.display = 'block';
                    toggleBtn.innerText = 'Show less';
                } else {
                    extendedDiv.style.display = 'none';
                    toggleBtn.innerText = 'Show more';
                }
            });

            container.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        document.getElementById('notifications-container').innerHTML =
            '<div class="text-danger">Failed to load notifications</div>';
    }
}

loadNotifications();

setInterval(loadNotifications, 10000);
</script>

<script>
// sidebar highlight + card + subtab title
document.addEventListener('DOMContentLoaded', () => {
    const sidebarLinks = document.querySelectorAll('.admin-sidebar .nav-link');
    const cards = document.querySelectorAll('.dashboard-card, #all-users-section');

    // Map each link to its card element
    const linkToCardMap = {};
    sidebarLinks.forEach(link => {
        const targetId = link.getAttribute('href').split('#')[1]; // get id after #
        const card = document.getElementById(targetId);
        if (card) linkToCardMap[targetId] = card;
    });

    // Click handler
    sidebarLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            cards.forEach(c => c.classList.remove('active'));
            sidebarLinks.forEach(l => l.classList.remove('active'));

            link.classList.add('active');

            const targetId = link.getAttribute('href').split('#')[1];
            if (linkToCardMap[targetId]) {
                const card = linkToCardMap[targetId];
                card.classList.add('active');

                // Remove any previous active-title highlights
                cards.forEach(c => {
                    const h5 = c.querySelector('h5');
                    if (h5) h5.classList.remove('active-title');
                });

                // If the card has subtabs (temperature / humidity), highlight its title
                const h5 = card.querySelector('h5');
                if (h5) h5.classList.add('active-title');
            }
        });
    });

    // Optional: scroll spy highlight on scroll
    window.addEventListener('scroll', () => {
        const scrollPos = window.scrollY + 100; // offset for sticky sidebar

        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const cardTop = rect.top + window.scrollY;
            const cardBottom = cardTop + rect.height;

            const cardLink = [...sidebarLinks].find(link => linkToCardMap[link.getAttribute('href').split('#')[1]] === card);

            if (scrollPos >= cardTop && scrollPos < cardBottom) {
                cards.forEach(c => c.classList.remove('active'));
                sidebarLinks.forEach(l => l.classList.remove('active'));
                card.classList.add('active');
                if (cardLink) cardLink.classList.add('active');

                const h5 = card.querySelector('h5');
                if (h5) {
                    cards.forEach(c => {
                        const h = c.querySelector('h5');
                        if (h) h.classList.remove('active-title');
                    });
                    h5.classList.add('active-title');
                }
            }
        });
    });
});
</script>

<script>

    const el = document.getElementById(id);

    if(el){

        el.classList.add("border-primary");
